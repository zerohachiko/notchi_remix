name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Validate project version
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          BUILD_SETTINGS=$(xcodebuild -showBuildSettings \
            -project notchi/notchi.xcodeproj \
            -scheme notchi \
            2>/dev/null)
          MARKETING_VERSION=$(printf '%s\n' "$BUILD_SETTINGS" | awk -F' = ' '/MARKETING_VERSION/ { print $2; exit }')
          BUILD_VERSION=$(printf '%s\n' "$BUILD_SETTINGS" | awk -F' = ' '/CURRENT_PROJECT_VERSION/ { print $2; exit }')
          LAST_PUBLISHED_BUILD=$(grep -oE '<sparkle:version>[0-9]+' docs/appcast.xml 2>/dev/null | sed 's#<sparkle:version>##' | head -1 || true)

          if [ -z "$MARKETING_VERSION" ]; then
            echo "Failed to determine MARKETING_VERSION from Xcode project"
            exit 1
          fi

          if [ -z "$BUILD_VERSION" ]; then
            echo "Failed to determine CURRENT_PROJECT_VERSION from Xcode project"
            exit 1
          fi

          if [ "$MARKETING_VERSION" != "$VERSION" ]; then
            echo "Tag version v$VERSION does not match project MARKETING_VERSION $MARKETING_VERSION"
            exit 1
          fi

          if ! [[ "$BUILD_VERSION" =~ ^[0-9]+$ ]]; then
            echo "CURRENT_PROJECT_VERSION must be numeric, got: $BUILD_VERSION"
            exit 1
          fi

          if [ -n "$LAST_PUBLISHED_BUILD" ]; then
            if ! [[ "$LAST_PUBLISHED_BUILD" =~ ^[0-9]+$ ]]; then
              echo "Latest published sparkle:version must be numeric, got: $LAST_PUBLISHED_BUILD"
              exit 1
            fi

            if [ "$BUILD_VERSION" -le "$LAST_PUBLISHED_BUILD" ]; then
              echo "CURRENT_PROJECT_VERSION $BUILD_VERSION must be greater than latest published sparkle:version $LAST_PUBLISHED_BUILD"
              exit 1
            fi

            echo "Validated project version $MARKETING_VERSION (build $BUILD_VERSION) against published build $LAST_PUBLISHED_BUILD"
          else
            echo "Validated project version $MARKETING_VERSION (build $BUILD_VERSION) in bootstrap mode with no published appcast item"
          fi

      - name: Prepare release notes asset
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          RELEASE_NOTES_SOURCE="docs/release-notes/$VERSION.md"
          RELEASE_NOTES_ASSET="$RUNNER_TEMP/Notchi-$VERSION.md"

          if [ ! -f "$RELEASE_NOTES_SOURCE" ]; then
            echo "Missing release notes file: $RELEASE_NOTES_SOURCE"
            exit 1
          fi

          cp "$RELEASE_NOTES_SOURCE" "$RELEASE_NOTES_ASSET"

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_FILE=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"

          security import "$CERT_FILE" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_FILE"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"

          security list-keychain -d user -s "$KEYCHAIN_FILE"

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project notchi/notchi.xcodeproj \
            -scheme notchi

      - name: Verify Sparkle tools
        id: sparkle
        run: |
          SPARKLE_BIN_DIR=$(find $HOME/Library/Developer/Xcode/DerivedData \
            -path "*/Sparkle/bin" -type d 2>/dev/null | head -1)

          if [ -z "$SPARKLE_BIN_DIR" ]; then
            echo "Error: Sparkle bin directory not found in DerivedData"
            echo "Searched: $HOME/Library/Developer/Xcode/DerivedData"
            find $HOME/Library/Developer/Xcode/DerivedData -name "sign_update" 2>/dev/null || true
            exit 1
          fi

          echo "Found Sparkle tools at: $SPARKLE_BIN_DIR"
          ls -la "$SPARKLE_BIN_DIR"
          echo "SPARKLE_BIN_DIR=$SPARKLE_BIN_DIR" >> $GITHUB_OUTPUT

      - name: Build and archive
        run: |
          xcodebuild archive \
            -project notchi/notchi.xcodeproj \
            -scheme notchi \
            -configuration Release \
            -archivePath $RUNNER_TEMP/notchi.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=SXT98GH5HN

      - name: Export archive
        run: |
          /usr/libexec/PlistBuddy -c "Add :method string developer-id" $RUNNER_TEMP/export.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string SXT98GH5HN" $RUNNER_TEMP/export.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/notchi.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/export.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/Notchi.app" \
            "$RUNNER_TEMP/notchi-submit.zip"

          xcrun notarytool submit "$RUNNER_TEMP/notchi-submit.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/export/Notchi.app"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_DIR=$RUNNER_TEMP/dmg_staging
          mkdir -p "$DMG_DIR"
          cp -R "$RUNNER_TEMP/export/Notchi.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "Notchi" -srcfolder "$DMG_DIR" \
            -ov -format UDZO "$RUNNER_TEMP/Notchi-$VERSION.dmg"

      - name: Write Sparkle key to temp file
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_KEY" > "$RUNNER_TEMP/sparkle_key"
          chmod 600 "$RUNNER_TEMP/sparkle_key"

      - name: Sign DMG with Sparkle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SPARKLE_BIN_DIR: ${{ steps.sparkle.outputs.SPARKLE_BIN_DIR }}
        run: |
          "$SPARKLE_BIN_DIR/sign_update" --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            "$RUNNER_TEMP/Notchi-$VERSION.dmg"

      - name: Update appcast.xml
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SPARKLE_BIN_DIR: ${{ steps.sparkle.outputs.SPARKLE_BIN_DIR }}
        run: |
          mkdir -p $RUNNER_TEMP/appcast_staging
          cp "$RUNNER_TEMP/Notchi-$VERSION.dmg" $RUNNER_TEMP/appcast_staging/
          cp "$RUNNER_TEMP/Notchi-$VERSION.md" $RUNNER_TEMP/appcast_staging/
          cp docs/appcast.xml $RUNNER_TEMP/appcast_staging/ 2>/dev/null || true

          "$SPARKLE_BIN_DIR/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --download-url-prefix "https://github.com/sk-ruban/notchi/releases/download/v$VERSION/" \
            --release-notes-url-prefix "https://updates.notchi.app/sparkle-notes/" \
            -o docs/appcast.xml \
            $RUNNER_TEMP/appcast_staging

          mkdir -p website/release-notes-signed
          cp "$RUNNER_TEMP/appcast_staging/Notchi-$VERSION.md" \
            "website/release-notes-signed/Notchi-$VERSION.md"

      - name: Cleanup Sparkle key
        if: always()
        run: rm -f "$RUNNER_TEMP/sparkle_key"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/Notchi-${{ steps.version.outputs.VERSION }}.dmg
            ${{ runner.temp }}/Notchi-${{ steps.version.outputs.VERSION }}.md
          body_path: ${{ runner.temp }}/Notchi-${{ steps.version.outputs.VERSION }}.md

      - name: Commit updated appcast
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cp docs/appcast.xml /tmp/appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main
          cp /tmp/appcast.xml docs/appcast.xml
          cp /tmp/appcast.xml website/public/appcast.xml
          git add docs/appcast.xml website/public/appcast.xml website/release-notes-signed/Notchi-$VERSION.md
          git diff --cached --quiet && echo "No appcast changes" || git commit -m "chore: update appcast for v$VERSION"
          git push origin main
