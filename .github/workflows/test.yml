name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project notchi/notchi.xcodeproj \
            -scheme notchi

      - name: Build and test
        run: |
          xcodebuild test \
            -project notchi/notchi.xcodeproj \
            -scheme notchi \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath $RUNNER_TEMP/TestResults.xcresult

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ${{ runner.temp }}/TestResults.xcresult
